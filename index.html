<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="theme-color" content="#1a1a2e">
    <title>IronChat - Brett & Assistant</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        body { font-family: -apple-system, BlinkMacSystemFont, 'SF Pro Display', sans-serif; background: linear-gradient(135deg, #1a1a2e 0%, #16213e 100%); color: #fff; min-height: 100vh; padding-top: env(safe-area-inset-top); padding-bottom: env(safe-area-inset-bottom); }
        .container { max-width: 800px; margin: 0 auto; padding: 15px; height: 100vh; display: flex; flex-direction: column; }
        header { text-align: center; margin-bottom: 15px; flex-shrink: 0; }
        h1 { font-size: 1.5rem; color: #00d9ff; margin-bottom: 5px; }
        .status { color: #888; font-size: 0.8rem; }
        .status.online { color: #00ff88; }
        .channels { display: flex; gap: 8px; margin-bottom: 15px; flex-wrap: wrap; justify-content: center; flex-shrink: 0; }
        .channel { padding: 8px 14px; border-radius: 20px; background: rgba(255,255,255,0.1); font-size: 0.8rem; cursor: pointer; border: 1px solid transparent; }
        .channel.active { background: #00d9ff; color: #1a1a2e; border-color: #00d9ff; }
        .chat-box { background: rgba(255,255,255,0.05); border-radius: 12px; padding: 15px; flex: 1; overflow-y: auto; margin-bottom: 15px; -webkit-overflow-scrolling: touch; }
        .message { margin-bottom: 12px; padding: 12px; border-radius: 12px; max-width: 85%; word-wrap: break-word; }
        .message.assistant { background: rgba(0, 217, 255, 0.15); margin-right: auto; border-left: 3px solid #00d9ff; }
        .message.brett { background: rgba(0, 255, 136, 0.15); margin-left: auto; border-right: 3px solid #00ff88; }
        .message .sender { font-weight: 600; margin-bottom: 4px; font-size: 0.8rem; color: #00d9ff; }
        .message.brett .sender { color: #00ff88; }
        .message .time { font-size: 0.7rem; opacity: 0.6; margin-top: 4px; }
        .message .content { font-size: 0.95rem; line-height: 1.4; }
        .input-area { display: flex; gap: 10px; flex-shrink: 0; }
        input[type="text"] { flex: 1; padding: 14px 18px; border: none; border-radius: 25px; background: rgba(255,255,255,0.1); color: #fff; font-size: 1rem; font-family: inherit; }
        input[type="text"]:focus { outline: 2px solid #00d9ff; }
        button { padding: 14px 24px; border: none; border-radius: 25px; background: linear-gradient(135deg, #00d9ff, #00ff88); color: #1a1a2e; font-weight: 700; cursor: pointer; font-size: 0.95rem; }
    </style>
</head>
<body>
    <div class="container">
        <header>
            <h1>⚡ IronChat</h1>
            <div class="status online">● Connected - Brett's Chat</div>
        </header>
        <div class="channels">
            <div class="channel active" data-channel="general"># general</div>
            <div class="channel" data-channel="work">💼 work</div>
            <div class="channel" data-channel="family">👨‍👩‍👧‍👦 family</div>
            <div class="channel" data-channel="ideas">💡 ideas</div>
        </div>
        <div class="chat-box" id="chatBox">
            <div class="message assistant">
                <div class="sender">Assistant</div>
                <div class="content">Hey Brett! Welcome to IronChat. What do you want to work on today?</div>
                <div class="time">Just now</div>
            </div>
        </div>
        <div class="input-area">
            <input type="text" id="messageInput" placeholder="Type a message..." autocomplete="off">
            <button id="sendBtn">Send</button>
        </div>
    </div>
    <script>
        document.getElementById('sendBtn').addEventListener('click', sendMessage);
        document.getElementById('messageInput').addEventListener('keypress', (e) => { if(e.key === 'Enter') sendMessage(); });
        document.querySelectorAll('.channel').forEach(channel => {
            channel.addEventListener('click', (e) => {
                document.querySelectorAll('.channel').forEach(c => c.classList.remove('active'));
                e.target.classList.add('active');
            });
        });
        function sendMessage() {
            const input = document.getElementById('messageInput');
            const content = input.value.trim();
            if(!content) return;
            const chatBox = document.getElementById('chatBox');
            const messageDiv = document.createElement('div');
            messageDiv.className = 'message brett';
            messageDiv.innerHTML = '<div class="sender">Brett</div><div class="content">' + content + '</div><div class="time">' + new Date().toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' }) + '</div>';
            chatBox.appendChild(messageDiv);
            chatBox.scrollTop = chatBox.scrollHeight;
            input.value = '';
        }
    </script>
</body>
</html>
